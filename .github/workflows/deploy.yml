name: Deploy to KVM

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Trigger Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger webhook deploy
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/webhook_response.txt -w "%{http_code}" \
            -X POST https://crm.edus-system.cloud/api/webhook/deploy \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '${{ toJSON(github.event) }}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '${{ toJSON(github.event) }}' \
            --max-time 30)
          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/webhook_response.txt || true
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Deploy webhook triggered successfully!"
          else
            echo "⚠️ Webhook returned $HTTP_STATUS — backend may not be running yet. Do first manual deploy on KVM."
            exit 0
          fi
