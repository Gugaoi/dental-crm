name: Deploy to KVM

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.KVM_HOST }}
          username: ${{ secrets.KVM_USER }}
          key: ${{ secrets.KVM_SSH_KEY }}
          port: 22
          script: |
            # Go to project directory
            mkdir -p /root/apps/dental-crm
            cd /root/apps/dental-crm

            # Pull latest code
            if [ -d .git ]; then
              git pull origin master
            else
              git clone https://github.com/Gugaoi/dental-crm.git .
            fi

            # Create .env if it doesn't exist (first deploy)
            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
              echo "⚠️  Created backend/.env from example — please update secrets!"
            fi

            # Build and restart all 4 containers
            docker compose down
            docker compose build --no-cache
            docker compose up -d

            # Wait for backend to be healthy
            sleep 5
            docker compose ps

            echo "✅ Dental CRM deployed successfully!"
