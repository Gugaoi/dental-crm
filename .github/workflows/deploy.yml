name: Deploy to KVM

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Trigger Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger webhook deploy
        run: |
          curl -X POST https://crm.edus-system.cloud/api/webhook/deploy \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '${{ toJSON(github.event) }}' | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '${{ toJSON(github.event) }}' \
            --max-time 30 \
            -f \
            -s
          echo "✅ Deploy webhook triggered!"
