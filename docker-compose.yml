services:
  dental-crm:
    build: .
    container_name: dental-crm
    restart: unless-stopped
    networks:
      - traefik-net
    labels:
      - "traefik.enable=true"
      # Change 'crm.edus-system.cloud' to your chosen subdomain
      - "traefik.http.routers.dental-crm.rule=Host(`crm.edus-system.cloud`)"
      - "traefik.http.routers.dental-crm.entrypoints=websecure"
      - "traefik.http.routers.dental-crm.tls=true"
      - "traefik.http.routers.dental-crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.dental-crm.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.dental-crm-http.rule=Host(`crm.edus-system.cloud`)"
      - "traefik.http.routers.dental-crm-http.entrypoints=web"
      - "traefik.http.routers.dental-crm-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

networks:
  traefik-net:
    external: true
    name: root_default
